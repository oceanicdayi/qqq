<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 日本親子行程 - 每日內容</title>
  <style>
    :root {
      --bg-color: #f1f5f9;
      --paper: #ffffff;
      --text-main: #334155;
      --text-heading: #0f172a;
      --text-muted: #64748b;
      --border-light: #e2e8f0;
      --accent: #0d9488;
      --accent-hover: #0f766e;
      --accent-soft: #ccfbf1;
      --link: #0284c7;
      --link-hover: #0369a1;
      --timeline-dot: #14b8a6;
      --timeline-line: #cbd5e1;
    }

    html {
      scroll-behavior: smooth;
    }

    * { 
      box-sizing: border-box; 
    }
    
    body {
      margin: 0;
      color: var(--text-main);
      background-color: var(--bg-color);
      font-family: "Noto Sans TC", "Microsoft JhengHei", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.7;
    }

    .wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 30px 20px 60px;
    }

    /* Header & Navigation */
    .header-section {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      margin: 0;
      font-size: 36px;
      color: var(--text-heading);
      letter-spacing: 1.5px;
      font-weight: 800;
    }

    .sub {
      margin: 8px 0 24px;
      color: var(--text-muted);
      font-size: 15px;
    }

    .nav-container {
      position: sticky;
      top: 10px;
      z-index: 100;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      padding: 16px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    .nav a {
      text-decoration: none;
      color: var(--text-main);
      background: var(--paper);
      border: 1px solid var(--border-light);
      border-radius: 20px;
      padding: 8px 18px;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .nav a:hover {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(13, 148, 136, 0.2);
    }

    /* Day Card Container */
    .day {
      background: var(--paper);
      border-radius: 16px;
      padding: 40px;
      margin-bottom: 40px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.04);
      border: 1px solid var(--paper);
      border-top: 6px solid var(--accent);
      scroll-margin-top: 100px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .day:hover {
      transform: translateY(-4px);
      box-shadow: 0 15px 35px rgba(15, 23, 42, 0.08);
    }

    .day-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid var(--border-light);
      padding-bottom: 20px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .day-header h2 {
      margin: 0;
      font-size: 26px;
      color: var(--text-heading);
      font-weight: 700;
    }

    .chip {
      font-size: 13px;
      color: var(--accent-hover);
      background: var(--accent-soft);
      border-radius: 8px;
      padding: 6px 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    /* Markdown Elements Styling */
    h3 {
      font-size: 18px;
      color: var(--text-heading);
      margin: 28px 0 14px;
      display: flex;
      align-items: center;
      font-weight: 700;
    }
    
    h3::before {
      content: "";
      display: inline-block;
      width: 5px;
      height: 18px;
      background: var(--accent);
      margin-right: 10px;
      border-radius: 4px;
    }

    ul, ol {
      margin: 0 0 20px 0;
      padding-left: 24px;
      color: var(--text-main);
    }

    li {
      margin-bottom: 8px;
    }

    a {
      color: var(--link);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    
    a:hover {
      color: var(--link-hover);
      text-decoration: underline;
    }

    /* Timeline */
    .timeline {
      list-style: none;
      padding-left: 14px;
      margin-top: 12px;
      border-left: 2px solid var(--timeline-line);
      position: relative;
    }
    
    .timeline li {
      position: relative;
      padding-left: 24px;
      margin-bottom: 18px;
    }
    
    .timeline li::before {
      content: "";
      position: absolute;
      left: -20px;
      top: 6px;
      width: 12px;
      height: 12px;
      background: var(--paper);
      border: 3px solid var(--timeline-dot);
      border-radius: 50%;
      box-shadow: 0 0 0 4px var(--paper);
    }
    
    .time-badge {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-weight: 600;
      color: var(--accent-hover);
      background: var(--accent-soft);
      padding: 4px 10px;
      border-radius: 6px;
      margin-right: 10px;
      font-size: 14px;
      letter-spacing: 0.5px;
      display: inline-block;
    }

    /* Table */
    .table-container {
      overflow-x: auto;
      margin-bottom: 24px;
      border-radius: 12px;
      box-shadow: 0 0 0 1px var(--border-light);
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      white-space: nowrap;
      border-style: hidden; 
    }
    
    th, td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border-light);
    }
    
    th {
      background-color: #f8fafc;
      color: var(--text-muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-size: 13px;
    }
    
    tbody tr {
      transition: background-color 0.2s;
    }
    
    tbody tr:hover {
      background-color: #f8fafc;
    }
    
    tbody tr:last-child td {
      border-bottom: none;
    }
    
    td.num {
      text-align: right;
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 14px;
      color: var(--text-heading);
    }

    /* Task List */
    .task-list {
      list-style: none;
      padding-left: 0;
    }
    
    .task-list li {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
      padding: 10px 14px;
      background: #f8fafc;
      border-radius: 8px;
      border: 1px solid transparent;
      transition: all 0.2s;
    }
    
    .task-list li:hover {
      background: #f1f5f9;
      border-color: var(--border-light);
    }
    
    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      cursor: pointer;
      margin-top: 4px;
    }

    /* Grid */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
    }
